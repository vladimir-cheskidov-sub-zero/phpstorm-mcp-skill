order:
  - bootstrap_non_trivial
  - semantic_first
  - bounded_mcp_low_level
  - non_mcp_fallback_only

invariants:
  bootstrap_non_trivial:
    skill_locator: "Bootstrap PHP project context first:"
    skill_required:
      - "`get_php_project_config`"
      - "`get_composer_dependencies`"
      - "`get_project_modules` / `get_repositories`"
      - "`get_run_configurations`"
    prompt_required:
      - "non-trivial PHP tasks"
      - "bootstrap project context first"
      - "PHP config"
      - "Composer dependencies"
      - "modules and repositories"
      - "run configurations"
  semantic_first:
    skill_locator: "For PHP code, ask the strongest question first:"
    skill_required:
      - "framework-aware tools"
      - "`get_inspections`"
      - "`search_symbol`"
      - "`get_symbol_info`"
      - "`search_structural`"
      - "before `read_file`, `search_text`, or regex"
    prompt_required:
      - "richest PhpStorm semantic answer available for PHP code"
  inspection_driven_fixing:
    skill_locator: "Prefer `get_inspections` over ad-hoc guessing."
    skill_required:
      - "Prefer `get_inspections` over ad-hoc guessing."
      - "Use `apply_quick_fix` only after selecting an exact quick fix from `get_inspections`."
    prompt_required:
      - "inspection-driven fixes"
      - "read inspections"
      - "apply exact quick fixes"
      - "before guessing"
  semantic_rename:
    skill_locator: "Prefer `rename_refactoring` over `replace_text_in_file` for identifiers."
    skill_required:
      - "`rename_refactoring`"
      - "`replace_text_in_file`"
      - "identifiers"
    prompt_required:
      - "identifier changes"
      - "semantic rename over text replacement"
  structural_search_migrations:
    skill_locator: "Prefer `search_structural` over regex when the target is a PHP code shape."
    skill_required:
      - "`search_structural`"
      - "regex"
      - "PHP code shape"
    prompt_required:
      - "Prefer structural search over regex"
      - "syntax-shaped migrations"
  bounded_mcp_low_level:
    skill_locator: "Prefer lower-level PhpStorm MCP tools such as"
    skill_required:
      - "`read_file`"
      - "`search_file`"
      - "`search_text`"
      - "`search_regex`"
      - "similar effort"
    prompt_required:
      - "fall back to bounded PhpStorm MCP reads or searches"
  non_mcp_fallback_only:
    skill_locator: "Treat external CLI search or read tooling as fallback only"
    skill_required:
      - "PhpStorm MCP lacks the capability"
      - "materially less effective"
    prompt_required:
      - "use non-MCP tooling only when"
  post_refactor_text_audit:
    skill_locator: "After semantic refactors, audit strings, templates, route names, service IDs, config keys, and docs with `search_text`."
    skill_required:
      - "audit strings"
      - "templates"
      - "route names"
      - "service IDs"
      - "config keys"
      - "docs"
    prompt_required:
      - "After semantic refactors"
      - "audit strings"
      - "templates"
      - "route names"
      - "service IDs"
      - "config keys"
      - "docs"
  behavior_validation:
    skill_locator: "For behavior changes, do not stop at `build_project`"
    skill_required:
      - "do not stop at `build_project`"
      - "`execute_run_configuration`"
      - "project test path"
    prompt_required:
      - "For behavior changes"
      - "validate beyond build_project"
      - "tests or run configurations"
  overlays_on_demand:
    skill_locator: "Load overlays only when the task or project proves they are needed."
    skill_required:
      - "Load overlays only when"
      - "task or project proves"
    prompt_required:
      - "Load framework or capability overlays only after the task proves the need"
