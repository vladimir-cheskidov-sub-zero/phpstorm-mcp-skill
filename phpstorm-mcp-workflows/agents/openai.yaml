interface:
  display_name: "PhpStorm MCP Workflows"
  short_description: "Use PhpStorm MCP as the source of truth for PHP project context, inspections, search, refactoring, validation, and on-demand overlays"
  default_prompt: "Use $phpstorm-mcp-workflows to solve this through PhpStorm MCP. On non-trivial PHP tasks, bootstrap project context first with PHP config, Composer dependencies, modules and repositories, and run configurations. Then start with the richest PhpStorm semantic answer available for PHP code, fall back to bounded PhpStorm MCP reads or searches, and use non-MCP tooling only when the IDE toolset cannot answer efficiently. Audit strings, templates, and config references after semantic refactors. Load framework or capability overlays only after the task clearly requires them."

dependencies:
  tools:
    - type: "mcp"
      value: "phpstorm"
      description: "JetBrains PhpStorm MCP server"

policy:
  allow_implicit_invocation: true
